name: Build + Release (Windows)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore MultiPingMonitor.sln

      - name: Publish (win-x64)
        run: dotnet publish MultiPingMonitor.sln -c Release -r win-x64 --self-contained false -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o publish

      - name: Zip
        shell: pwsh
        run: Compress-Archive -Path publish\* -DestinationPath MultiPingMonitor-win-x64.zip -Force

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: MultiPingMonitor-win-x64.zip
          generate_release_notes: true
